<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Submarino CAD - Realidad Virtual</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="submarino" src="submarino.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#submarino" position="0 1.5 -10" scale="0.1 0.1 0.1"></a-entity>

      <a-box position="-2 0.5 -5" color="red"></a-box>

      <a-sky color="#001e3e"></a-sky>
      
      <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="-1 10 3"></a-entity>
    </a-scene>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submarino AR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <!-- AR.js para A-Frame: provee cámara real de fondo -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }

      /* AR.js pone un <video> de fondo — aseguramos que sea visible */
      video {
        position: fixed !important;
        top: 0; left: 0;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
        z-index: 0;
      }

      canvas {
        position: fixed !important;
        top: 0; left: 0;
        z-index: 1;
        background: transparent !important;
      }

      #info {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 20px;
        background: rgba(0,0,0,0.55);
        color: white;
        border-radius: 24px;
        font-size: 13px;
        font-family: sans-serif;
        text-align: center;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

    <div id="info">🔍 Apunta la cámara a un marcador Hiro</div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="submarino" src="submarino.glb"></a-asset-item>
      </a-assets>

      <!-- Marcador Hiro estándar — el modelo aparece sobre él -->
      <a-marker preset="hiro">
        <a-entity
          gltf-model="#submarino"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
      <a-entity light="type: directional; intensity: 1.2;" position="1 10 3"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>

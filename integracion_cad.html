<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submarino AR/VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #001e3e; overflow: hidden; font-family: sans-serif; }

    canvas { display: block; }

    #overlay {
      position: fixed;
      bottom: 30px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    .btn {
      padding: 13px 28px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #btn-ar {
      background: rgba(0, 140, 255, 0.9);
      color: white;
      box-shadow: 0 4px 20px rgba(0,140,255,0.4);
      display: none;
    }

    #btn-vr {
      background: rgba(80, 0, 200, 0.9);
      color: white;
      box-shadow: 0 4px 20px rgba(80,0,200,0.4);
      display: none;
    }

    #msg {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 10;
      display: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #001e3e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      z-index: 20;
    }
  </style>
</head>
<body>

<div id="loading">⏳ Cargando submarino...</div>
<div id="msg"></div>

<div id="overlay">
  <button class="btn" id="btn-ar">📷 Modo AR</button>
  <button class="btn" id="btn-vr">🥽 Modo VR</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true,            // fondo transparente para AR
  logarithmicDepthBuffer: true
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x001e3e, 1); // azul en modo normal
document.body.appendChild(renderer.domElement);

// ── Escena ────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001e3e);

// Luces
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(1, 10, 3);
scene.add(dirLight);

// ── Cámara ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 1.6, 3);

// ── Controles (solo modo normal) ──────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, -2);
controls.update();

// ── Cargar modelo ─────────────────────────────────────────
let submarine;
const loader = new GLTFLoader();
loader.load(
  'submarino.glb',
  (gltf) => {
    submarine = gltf.scene;
    submarine.position.set(0, 1.2, -5);
    submarine.scale.set(0.1, 0.1, 0.1);
    submarine.rotation.y = Math.PI / 4;
    scene.add(submarine);
    document.getElementById('loading').style.display = 'none';
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round(progress.loaded / progress.total * 100);
      document.getElementById('loading').textContent = `⏳ Cargando... ${pct}%`;
    }
  },
  (err) => {
    document.getElementById('loading').textContent = '❌ Error cargando submarino.glb';
    console.error(err);
  }
);

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Modo AR ───────────────────────────────────────────────
function enterAR() {
  navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['local'],
    optionalFeatures: ['hit-test', 'dom-overlay'],
    domOverlay: { root: document.getElementById('overlay') }
  }).then(session => {
    // Fondo transparente → se ve la cámara
    renderer.setClearColor(0x000000, 0);
    scene.background = null;

    // Acercar el modelo para AR
    if (submarine) {
      submarine.position.set(0, 0, -1.5);
      submarine.scale.set(0.05, 0.05, 0.05);
    }

    controls.enabled = false;
    renderer.xr.setSession(session);

    document.getElementById('btn-ar').textContent = '✖ Salir AR';
    showMsg('Modo AR activo');

    session.addEventListener('end', () => {
      exitImmersive();
      document.getElementById('btn-ar').textContent = '📷 Modo AR';
    });
  }).catch(err => {
    showMsg('Error AR: ' + err.message);
    console.error(err);
  });
}

// ── Modo VR ───────────────────────────────────────────────
function enterVR() {
  navigator.xr.requestSession('immersive-vr', {
    optionalFeatures: ['local-floor', 'bounded-floor']
  }).then(session => {
    // Fondo azul en VR
    renderer.setClearColor(0x001e3e, 1);
    scene.background = new THREE.Color(0x001e3e);

    if (submarine) {
      submarine.position.set(0, 1.2, -5);
      submarine.scale.set(0.1, 0.1, 0.1);
    }

    controls.enabled = false;
    renderer.xr.setSession(session);

    document.getElementById('btn-vr').textContent = '✖ Salir VR';
    showMsg('Modo VR activo');

    session.addEventListener('end', () => {
      exitImmersive();
      document.getElementById('btn-vr').textContent = '🥽 Modo VR';
    });
  }).catch(err => {
    showMsg('Error VR: ' + err.message);
    console.error(err);
  });
}

function exitImmersive() {
  renderer.setClearColor(0x001e3e, 1);
  scene.background = new THREE.Color(0x001e3e);
  if (submarine) {
    submarine.position.set(0, 1.2, -5);
    submarine.scale.set(0.1, 0.1, 0.1);
  }
  controls.enabled = true;
  controls.update();
}

// ── Botones ───────────────────────────────────────────────
const btnAR = document.getElementById('btn-ar');
const btnVR = document.getElementById('btn-vr');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar').then(ok => {
    if (ok) btnAR.style.display = 'inline-block';
  });
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (ok) btnVR.style.display = 'inline-block';
  });
}

btnAR.addEventListener('click', () => {
  if (renderer.xr.isPresenting) renderer.xr.getSession()?.end();
  else enterAR();
});

btnVR.addEventListener('click', () => {
  if (renderer.xr.isPresenting) renderer.xr.getSession()?.end();
  else enterVR();
});

// ── Animación ─────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  if (!renderer.xr.isPresenting) {
    controls.update();
  }
  if (submarine && !renderer.xr.isPresenting) {
    submarine.rotation.y += 0.003;
  }
  renderer.render(scene, camera);
});

// ── Helpers ───────────────────────────────────────────────
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
</script>

</body>
</html>

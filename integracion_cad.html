<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submarino CAD - AR/VR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <style>
      body { margin: 0; background: #000; }

      #ar-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        padding: 14px 32px;
        background: rgba(0, 120, 255, 0.9);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-family: sans-serif;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,120,255,0.5);
        display: none;
      }

      #status {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        padding: 8px 18px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        border-radius: 20px;
        font-size: 13px;
        font-family: sans-serif;
        display: none;
      }
    </style>
  </head>
  <body>

    <button id="ar-button">📷 Entrar en AR</button>
    <div id="status"></div>

    <a-scene
      id="scene"
      renderer="alpha: true; antialias: true; colorManagement: true;"
      vr-mode-ui="enabled: true"
      background="color: #001e3e"
    >
      <a-assets>
        <a-asset-item id="submarino" src="submarino.glb"></a-asset-item>
      </a-assets>

      <a-entity
        gltf-model="#submarino"
        position="0 1.2 -5"
        scale="0.1 0.1 0.1"
        rotation="0 45 0">
      </a-entity>

      <a-sky id="sky" color="#001e3e"></a-sky>

      <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
      <a-entity light="type: directional; intensity: 1.2;" position="1 10 3"></a-entity>
    </a-scene>

    <script>
      const scene  = document.getElementById('scene');
      const sky    = document.getElementById('sky');
      const arBtn  = document.getElementById('ar-button');
      const status = document.getElementById('status');

      function showStatus(msg, duration) {
        status.textContent = msg;
        status.style.display = 'block';
        if (duration !== 0) setTimeout(() => { status.style.display = 'none'; }, duration || 3000);
      }

      // Detectar soporte AR
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          if (supported) arBtn.style.display = 'block';
          else showStatus('⚠️ AR no soportado en este dispositivo');
        }).catch(() => {});
      }

      // Entrar en AR manualmente para controlar alpha
      arBtn.addEventListener('click', () => {
        if (scene.is('ar-mode')) {
          scene.exitVR();
          return;
        }

        navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local'],
          optionalFeatures: ['hit-test', 'dom-overlay'],
          domOverlay: { root: document.body }
        }).then((xrSession) => {

          const renderer = scene.renderer;

          // CLAVE: alpha true en el contexto WebGL antes de conectar la sesión
          renderer.setClearColor(0x000000, 0);
          renderer.setClearAlpha(0);
          scene.canvas.style.background = 'transparent';

          renderer.xr.setSession(xrSession);
          scene.addState('ar-mode');

          // Ocultar sky para ver la cámara
          sky.setAttribute('visible', false);
          scene.setAttribute('background', 'color: transparent');

          arBtn.textContent = '✖ Salir de AR';

          xrSession.addEventListener('end', () => {
            exitARMode();
          });

        }).catch((err) => {
          showStatus('❌ Error: ' + err.message);
          console.error(err);
        });
      });

      function exitARMode() {
        sky.setAttribute('visible', true);
        scene.setAttribute('background', 'color: #001e3e');
        scene.renderer.setClearColor(0x001e3e, 1);
        scene.renderer.setClearAlpha(1);
        scene.canvas.style.background = '';
        scene.removeState('ar-mode');
        arBtn.textContent = '📷 Entrar en AR';
      }

      // VR normal: asegurar que el sky esté visible
      scene.addEventListener('enter-vr', () => {
        if (!scene.is('ar-mode')) {
          sky.setAttribute('visible', true);
          scene.setAttribute('background', 'color: #001e3e');
        }
      });

      scene.addEventListener('exit-vr', () => {
        if (!scene.is('ar-mode')) {
          exitARMode();
        }
      });
    </script>
  </body>
</html>

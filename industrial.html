<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Modelo Industrial - Parte C</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-sky color="#ECECEC"></a-sky>

      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#333333"></a-plane>

      <a-entity id="banda_transportadora" position="0 0.5 -4">
        <a-box position="0 0.5 0" width="1" height="0.1" depth="6" color="#222222"></a-box>
        <a-box position="0.4 0 2.5" width="0.1" height="1" depth="0.1" color="#777777"></a-box>
        <a-box position="-0.4 0 2.5" width="0.1" height="1" depth="0.1" color="#777777"></a-box>
        <a-box position="0.4 0 -2.5" width="0.1" height="1" depth="0.1" color="#777777"></a-box>
        <a-box position="-0.4 0 -2.5" width="0.1" height="1" depth="0.1" color="#777777"></a-box>
      </a-entity>

      <a-entity id="tanque_quimico" position="-2.5 1.5 -5">
        <a-cylinder radius="0.8" height="3" color="#C0C0C0" metalness="0.5"></a-cylinder>
        <a-sphere position="0 1.2 0.75" radius="0.15" color="#00FF00" id="sensor_nivel"></a-sphere>
        <a-cylinder position="1 -1 0" rotation="0 0 90" radius="0.1" height="1.5" color="#555555"></a-cylinder>
      </a-entity>

      <a-entity id="panel_control" position="2 1.2 -3" rotation="0 -30 0">
        <a-box width="0.8" height="1.2" depth="0.1" color="#444444"></a-box>
        <a-sphere position="-0.2 0.3 0.1" radius="0.08" color="red"></a-sphere> 
        <a-sphere position="0.2 0.3 0.1" radius="0.08" color="green"></a-sphere> 
      </a-entity>

      <a-plane position="0 5 -10" width="20" height="10" color="#556677"></a-plane>

      <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="-1 10 3"></a-entity>

    </a-scene>
  </body>
</html>
